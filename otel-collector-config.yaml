receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  azuremonitor:
    connection_string: "populated from env"
    custom_events_enabled: true
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
  otlp_grpc/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug, otlp_grpc/jaeger, otlp_grpc/tempo, azuremonitor]
    metrics:
      receivers: [otlp]
      exporters: [debug, prometheusremotewrite, azuremonitor]
    logs:
      receivers: [otlp]
      exporters: [debug, otlp_http/loki, azuremonitor]
