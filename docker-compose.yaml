services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - 4317:4317 # OTLP gRPC receiver
      - 4318:4318 # OTLP http receiver
      # - 8889:8889 # Prometheus exporter
    environment:
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING}

  jaeger:
    image: jaegertracing/jaeger:2.16.0
    ports:
      - 16686:16686 # Jaeger UI
      # - 14268:14268 # Jaeger collector HTTP endpoint
      # - 14250:14250 # Jaeger collector gRPC endpoint
      - 4317
    depends_on:
      - otel-collector

  prometheus:
    image: prom/prometheus:v3.10.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--web.enable-remote-write-receiver'
      # - '--web.enable-otlp-receiver'
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - 9090:9090
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:12.4.1
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - 3000:3000
    depends_on:
      - loki
      - prometheus
      - tempo

  loki:
    image: grafana/loki:3.6.7
    ports:
      - 3100:3100
      - 4317
    depends_on:
      - otel-collector

  tempo:
    image: grafana/tempo:2.10.1
    command:
      - "-config.file=/etc/tempo.yaml"
      # - "-target=all"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - ./tempo-data:/var/tempo
    ports:
      - 3200:3200
      - 4317
    depends_on:
      - otel-collector
